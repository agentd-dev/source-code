name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      # --all-features so feature-gated modules are linted too — a
      # default-features lint pass let a gated module rot twice.
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace

  # The capability-pruning story, proven in CI: every feature
  # combination an operator is likely to ship must build and test
  # clean on its own.
  features:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - "--no-default-features"
          - "--no-default-features --features tools-fs,tools-data,trigger-http,auth,server-tls"
          - "--features tools-http,tools-shell"
          # TLS client WITHOUT server-tls: the single-crypto-provider
          # build (ureq/ring only) that --all-features can't exercise.
          - "--features tools-http-tls"
          # Secrets sources standalone (oauth2 pulls ureq without the
          # other ureq features; exec has no deps at all).
          - "--features secrets-oauth2,secrets-exec"
          - "--features trigger-cron,trigger-fs-watch"
          - "--features signing,auth-oidc,policy-rego,schema"
          - "--features intel-unix,intel-http,intel-remote"
          - "--all-features"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p agentd ${{ matrix.features }}

  # Run the conformance corpus as a visible gate: pass^k, capability
  # coverage, fault tolerance, security denials, and cost-per-success
  # print to the log. `cargo test --workspace` already gates it; this
  # surfaces the headline numbers.
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -p agentd-conformance --release -- crates/agentd-conformance/corpus
      - name: Compile benchmarks
        run: cargo bench -p agentd-conformance --no-run

  # The TypeScript authoring SDK: prove its emitted TOML is accepted by
  # the real runtime, not just well-shaped.
  sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cargo build -p agentd
      - name: SDK tests (round-trip through agentd --validate-only)
        run: node --test
        working-directory: sdk/typescript
        env:
          AGENTD_BIN: ${{ github.workspace }}/target/debug/agentd

  # Every showcased example workflow must stay valid against the real
  # binary, so a docs example can never silently rot. Built --all-features
  # so every node kind / trigger / provider an example uses resolves.
  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p agentd --all-features
      - name: Validate every example workflow
        run: |
          bin=target/debug/agentd
          fail=0
          for f in examples/*.toml examples/reference/*.toml examples/use-cases/*.toml; do
            case "$f" in
              # self-planning-agent.toml is an instruction file, not a
              # workflow — it has its own mode, not --validate-only.
              *self-planning-agent.toml) echo "skip $f (instruction file)"; continue ;;
            esac
            if "$bin" --config "$f" --validate-only >/dev/null; then
              echo "ok   $f"
            else
              echo "FAIL $f"; "$bin" --config "$f" --validate-only || true; fail=1
            fi
          done
          exit $fail
