[package]
name = "agentd-conformance"
version = "0.8.0"
edition = "2024"
rust-version = "1.85"
description = "Conformance, reliability, and benchmark suite for the agentd runtime"
license = "MIT"
repository = "https://github.com/agentd-dev/source-code"
publish = false

[lib]
name = "agentd_conformance"
path = "src/lib.rs"

[[bin]]
name = "agentd-conformance"
path = "src/main.rs"

[dependencies]
# The runtime under test. Extra tool families on so the corpus can
# exercise http/shell/mcp node kinds, not just the default set.
agentd = { path = "../agentd", features = ["tools-http", "tools-shell", "tools-mcp"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = { version = "0.8", default-features = false, features = ["parse"] }
