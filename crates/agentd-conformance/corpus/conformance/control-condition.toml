name = "control-condition"
description = "A condition node routes on JSON truthiness of a context value."
capabilities = ["condition", "terminate", "trigger_manual"]

[workflow]
inline = """
name = "cond"
[[start_nodes]]
name = "main"
source = "manual"
entry_node = "gate"
[[nodes]]
id = "gate"
type = "condition"
expr = "trigger.go"
[[nodes]]
id = "yes"
type = "terminate"
[[nodes]]
id = "no"
type = "terminate"
[[edges]]
from = "gate"
when = "true"
to = "yes"
[[edges]]
from = "gate"
when = "false"
to = "no"
"""

[trigger]
payload = { go = true }

[expected]
status = "completed"
last_node = "yes"
path = ["gate", "yes"]
path_exact = true
