name = "control-merge-terminate"
description = "The control plane walks a linear merge → terminate path."
capabilities = ["merge", "terminate"]

[workflow]
inline = """
name = "control_linear"

[[start_nodes]]
name = "main"
source = "manual"
entry_node = "a"

[[nodes]]
id = "a"
type = "merge"

[[nodes]]
id = "b"
type = "terminate"

[[edges]]
from = "a"
to = "b"
"""

[expected]
status = "completed"
last_node = "b"
path = ["a", "b"]
path_exact = true
