name = "control-respond"
description = "A respond node renders its templated reply and the run completes (the spec rides the outcome; the HTTP trigger writes it verbatim)."
capabilities = ["respond", "terminate", "trigger_manual"]

[workflow]
inline = """
name = "responder"
[[start_nodes]]
name = "main"
source = "manual"
entry_node = "answer"
[[nodes]]
id = "answer"
type = "respond"
status = 200
content_type = "text/xml"
body_template = "<Response><Say>{{greeting}}</Say></Response>"
[[nodes]]
id = "done"
type = "terminate"
[[edges]]
from = "answer"
to = "done"
"""

[trigger]
payload = { greeting = "hello caller" }

[expected]
status = "completed"
last_node = "done"
