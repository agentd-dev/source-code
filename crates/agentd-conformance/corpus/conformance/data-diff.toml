name = "data-diff"
description = "diff_compute produces a structural diff of two context values."
capabilities = ["diff_compute", "terminate", "trigger_manual"]

[workflow]
inline = """
name = "differ"
[[start_nodes]]
name = "main"
source = "manual"
entry_node = "diff"
[[nodes]]
id = "diff"
type = "diff_compute"
left_from = "trigger.before"
right_from = "trigger.after"
[[nodes]]
id = "done"
type = "terminate"
[[edges]]
from = "diff"
to = "done"
"""

[trigger]
payload = { before = { x = 1 }, after = { x = 2 } }

[expected]
status = "completed"
path = ["diff", "done"]
path_exact = true
