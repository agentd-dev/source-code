name = "data-pipeline"
description = "Pure data plane: parse a JSON string from the trigger, select a field, render it into a string."
capabilities = ["parse_json", "json_select", "template_render", "terminate", "trigger_manual"]

[workflow]
inline = """
name = "data_pipeline"

[[start_nodes]]
name = "main"
source = "manual"
entry_node = "parse"

[[nodes]]
id = "parse"
type = "parse_json"
input_from = "trigger.doc"

[[nodes]]
id = "pick"
type = "json_select"
input_from = "parse.parsed"
path = "order.id"

[[nodes]]
id = "render"
type = "template_render"
template = "order {{value}} accepted"
input_from = "pick"

[[nodes]]
id = "done"
type = "terminate"

[[edges]]
from = "parse"
to = "pick"

[[edges]]
from = "pick"
to = "render"

[[edges]]
from = "render"
to = "done"
"""

[trigger]
kind = "manual"
payload = { doc = "{\"order\": {\"id\": 4242}}" }

[expected]
status = "completed"
last_node = "done"
path = ["parse", "pick", "render", "done"]
path_exact = true
