name = "llm-route"
description = "An llm_infer node's structured answer drives a switch; the model fills one node, the graph routes."
capabilities = ["llm_infer", "switch", "terminate", "trigger_manual"]

[workflow]
inline = """
name = "llm_router"

[[start_nodes]]
name = "main"
source = "manual"
entry_node = "classify"

[[nodes]]
id = "classify"
type = "llm_infer"
backend = "default"
prompt = "Classify the document and answer with a routing decision."
input_from = "trigger"
output_schema = "inline"

[[nodes]]
id = "route"
type = "switch"
expr = "classify.parsed.decision"

[[nodes]]
id = "done_alpha"
type = "terminate"

[[nodes]]
id = "done_beta"
type = "terminate"

[[edges]]
from = "classify"
to = "route"

[[edges]]
from = "route"
when = "alpha"
to = "done_alpha"

[[edges]]
from = "route"
when = "beta"
to = "done_beta"
"""

[trigger]
kind = "manual"
payload = { body = "two widgets, net 30" }

# Single deterministic turn: the model returns a valid routing JSON.
[[intel.turns]]
content = '{"decision": "alpha"}'
prompt_tokens = 120
completion_tokens = 8

[expected]
status = "completed"
last_node = "done_alpha"
path = ["classify", "route", "done_alpha"]
path_exact = true
max_llm_calls = 1
max_total_tokens = 200
