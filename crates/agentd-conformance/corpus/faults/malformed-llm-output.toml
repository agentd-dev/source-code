name = "fault-malformed-llm-output"
description = "When output_schema is set and the model returns non-JSON, the node rejects it fail-closed — a bounded `errored` stop, not a crash or a hang, with cost still accounted."
capabilities = ["llm_infer", "fault_tolerance"]

[workflow]
inline = """
name = "malformed_guard"

[[start_nodes]]
name = "main"
source = "manual"
entry_node = "classify"

[[nodes]]
id = "classify"
type = "llm_infer"
backend = "default"
prompt = "decide"
input_from = "trigger"
output_schema = "inline"

[[nodes]]
id = "done"
type = "terminate"

[[edges]]
from = "classify"
to = "done"
"""

[trigger]
payload = { body = "anything" }

# The model returns prose where JSON was required.
[[intel.turns]]
content = "Sure! Here is the classification you asked for."
prompt_tokens = 60
completion_tokens = 12

[expected]
status = "errored"
reason_contains = "JSON"
# Bounded: exactly the one call's tokens were spent, no runaway.
max_llm_calls = 1
max_total_tokens = 100
