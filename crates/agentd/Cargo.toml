[package]
name = "agentd"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Bounded workflow-driven agent runtime"
license = "MIT"
repository = "https://github.com/agentd-dev/source-code"
publish = false

[lib]
name = "agentd"
path = "src/lib.rs"

[[bin]]
name = "agentd"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
toml = { version = "0.8", default-features = false, features = ["parse"] }
