[package]
name = "agentd"
version = "0.8.0"
edition = "2024"
rust-version = "1.85"
description = "Bounded workflow-driven agent runtime (RFC: rfcs/0001-bounded-workflow-runtime.md)"
license = "MIT"
repository = "https://github.com/agentd-dev/source-code"
publish = false

[lib]
name = "agentd"
path = "src/lib.rs"

[[bin]]
name = "agentd"
path = "src/main.rs"

[features]
# Default tool families match the RFC §10.2 base set minus HTTP/MCP.
# `trigger-http` is on by default so serve mode Just Works; the
# sealed-appliance build recipe turns it off so zero-egress
# deployments stay egress-free by construction. `auth` ships in
# default builds — HMAC-SHA256 is a basic need for any production
# HTTP surface.
default = [
    "tools-fs",
    "tools-env",
    "tools-data",
    "trigger-http",
    "auth",
]

# Tool families (compile-time capability pruning, RFC §10.4).
tools-fs = []
tools-env = []
tools-data = []
tools-http = []
tools-shell = []
tools-mcp = []

# Trigger adapters.
trigger-http = []
trigger-mcp = []
# Cron / interval trigger. Pulls `cron` (pure-Rust parser) only;
# the scheduler thread is native std::thread + sleep.
trigger-cron = ["dep:cron", "dep:chrono"]
# Filesystem-watch trigger. Pulls `notify` (kqueue / inotify /
# ReadDirectoryChangesW). Dedicated thread drains events into
# the engine; debounce coalesces bursts.
trigger-fs-watch = ["dep:notify"]

# Policy-as-code (Rego) via regorus. Pure-Rust OPA evaluator.
# Layered on top of the existing static allowlist — Rego is an
# additional AND condition. Workflows that want Rego-only
# evaluation leave static allowlists empty (defaults deny, so
# Rego's `allow` decision becomes authoritative).
policy-rego = ["dep:regorus"]

# Intelligence transports.
intel-unix = []
intel-http = []
# Remote LLM providers (Anthropic / OpenAI / Gemini /
# openai-compatible) for `[[intelligence.backends]]`. Pulls `ureq`
# (blocking, rustls) — no async runtime enters the core.
intel-remote = ["dep:ureq"]

# HTTP auth (bearer + HMAC webhook verification).
auth = ["dep:sha2", "dep:hmac"]

# In-process TLS termination + optional mTLS client-cert
# verification. Pulls rustls and rustls-pemfile; implies `auth` so
# the mTLS verifier is always reachable.
server-tls = ["auth", "dep:rustls", "dep:rustls-pemfile", "dep:x509-parser"]

# Signed workflow verification (RFC 0002). Ed25519 detached
# signatures verified before the DAG validator runs. Pure-Rust
# crypto; no native C. Off by default — opt-in for hardened
# deployments.
signing = ["dep:ed25519-dalek", "dep:base64"]

# OIDC / JWT bearer auth. Validates iss/aud/exp/nbf
# + RS256/ES256 signatures against an operator-supplied JWKS
# (file or inline). Live JWKS fetch over HTTPS is deferred to
# a v2 follow-up — operators rotate JWKS via external cron /
# sidecar today. Implies `auth` so the verifier is always
# reachable alongside bearer/HMAC/mTLS.
auth-oidc = ["auth", "dep:jsonwebtoken", "dep:base64"]

# Direct OTLP exporter for spans. Pulls tokio +
# opentelemetry_sdk + opentelemetry-otlp + tracing-opentelemetry.
# Substantial dep expansion (~50 crates) — accepted cost for
# first-class OTLP export rather than the filelog-receiver
# indirection (which still works and stays available via the
# existing JSON log format + `[logging.audit]` sink).
otel = [
    "dep:opentelemetry",
    "dep:opentelemetry_sdk",
    "dep:opentelemetry-otlp",
    "dep:tracing-opentelemetry",
    "dep:tokio",
]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
toml = { version = "0.8", default-features = false, features = ["parse"] }
tracing = { version = "0.1", default-features = false, features = ["std", "attributes"] }
tracing-subscriber = { version = "0.3", default-features = false, features = ["std", "fmt", "env-filter", "ansi", "json"] }
tracing-appender = { version = "0.2", default-features = false }
sha2 = { version = "0.10", default-features = false, optional = true }
hmac = { version = "0.12", default-features = false, optional = true }
# Atomic swap for hot-reload state (SIGHUP). Pure-Rust, no deps.
# Readers see a consistent snapshot with no mutex contention;
# writers replace the current value atomically.
arc-swap = "1"
rustls = { version = "0.23", optional = true, default-features = false, features = ["std", "logging", "aws-lc-rs", "tls12"] }
rustls-pemfile = { version = "2", optional = true }
x509-parser = { version = "0.16", optional = true, default-features = false }
ed25519-dalek = { version = "2", optional = true, default-features = false, features = ["std", "pkcs8", "pem"] }
base64 = { version = "0.22", optional = true, default-features = false, features = ["std"] }
jsonwebtoken = { version = "9", optional = true, default-features = false, features = ["use_pem"] }
# Blocking HTTPS client for remote LLM providers (rustls-backed).
ureq = { version = "2", optional = true, default-features = false, features = ["tls"] }
# Pure-Rust cron expression parser + schedule iterator.
cron = { version = "0.12", optional = true }
chrono = { version = "0.4", optional = true, default-features = false, features = ["std", "clock"] }
# Cross-platform filesystem event source (inotify on Linux).
notify = { version = "6", optional = true }
# OpenTelemetry stack (feature `otel`). Pinned to the 0.27
# generation — matches the ecosystem's stable contract for
# tracing-opentelemetry 0.28.
opentelemetry = { version = "0.27", optional = true, default-features = false, features = ["trace"] }
opentelemetry_sdk = { version = "0.27", optional = true, default-features = false, features = ["trace", "rt-tokio"] }
opentelemetry-otlp = { version = "0.27", optional = true, default-features = false, features = ["trace", "grpc-tonic"] }
tracing-opentelemetry = { version = "0.28", optional = true, default-features = false }
tokio = { version = "1", optional = true, default-features = false, features = ["rt-multi-thread", "macros"] }
# Pure-Rust OPA/Rego evaluator. ~500KB of source; no transitive
# runtime deps that fight the dep-light posture.
regorus = { version = "0.3", optional = true, default-features = false, features = ["std"] }

# libc — Unix-only. Used for sigaction (signals.rs) and setrlimit
# (budget.rs). Every call site is already `#[cfg(unix)]` gated, so
# scoping the dep to Unix targets lets the crate compile on Windows
# without carrying the unused dep there.
[target.'cfg(unix)'.dependencies]
libc = "0.2"

# Windows ctrl-C / ctrl-break handler for the shutdown path. On
# Unix we use raw `sigaction` via `libc`; Windows goes through
# the small `ctrlc` crate (no signal concept on Windows, so this
# wraps `SetConsoleCtrlHandler`).
#
# `windows-sys` provides the Job Objects bindings that replace
# `setrlimit` for memory + CPU-time budgets (see `src/budget.rs`).
# ctrlc already pulls it transitively; we pin the minimum feature
# set we need explicitly so the dep tree stays audit-friendly.
[target.'cfg(windows)'.dependencies]
ctrlc = { version = "3", default-features = false }
windows-sys = { version = "0.59", features = [
    "Win32_Foundation",
    "Win32_Security",
    "Win32_System_JobObjects",
    "Win32_System_Threading",
] }

[dev-dependencies]
tempfile = "3"
# Generates self-signed server + client certs at test time so the
# TLS integration tests don't need fixture files to maintain.
rcgen = "0.13"

# Unix-only dev dep mirroring the runtime one — tests that poke
# signal handlers directly need libc even when the crate lib is
# compiling on Windows.
[target.'cfg(unix)'.dev-dependencies]
libc = "0.2"

[build-dependencies]
toml = { version = "0.8", default-features = false, features = ["parse"] }

# ---------------------------------------------------------------------------
# Distribution metadata — consumed by `cargo deb` and
# `cargo generate-rpm`. Both are dev-only; they're invoked from CI
# on tagged releases and attach the resulting .deb / .rpm to the
# GitHub Release page. See packaging/README.md.
# ---------------------------------------------------------------------------
[package.metadata.deb]
name = "agentd"
maintainer = "Andrii Tsok <andrii@tsok.org>"
copyright = "2026, Andrii Tsok"
license-file = ["../../LICENSE", "0"]
extended-description = """\
Bounded workflow-driven runtime with compile-time constrained \
capabilities. Executes a predeclared DAG of typed nodes authored in \
TOML; never invents new tools or workflow paths at run time. \
Docs: https://github.com/agentd-dev/source-code/tree/main/docs"""
section = "utility"
priority = "optional"
assets = [
    ["target/release/agentd", "usr/bin/", "755"],
    ["../../packaging/systemd/agentd.service", "lib/systemd/system/", "644"],
    ["../../packaging/systemd/agentd.env", "etc/default/agent", "644"],
    ["../../packaging/README.md", "usr/share/doc/agentd/", "644"],
    ["../../docs/README.md", "usr/share/doc/agentd/docs/", "644"],
]
# Create /etc/agentd/ (empty; operator drops workflow.toml here).
maintainer-scripts = "../../packaging/debian/"
systemd-units = { enable = false, start = false }

[package.metadata.generate-rpm]
# `name` defaults to the crate name. Paths are resolved relative to
# the cwd when `cargo generate-rpm` is invoked, not the Cargo.toml —
# the CI job runs it from the workspace root, so paths are
# workspace-relative.
summary = "Bounded workflow-driven runtime"
license = "MIT"
url = "https://github.com/agentd-dev/source-code"
assets = [
    { source = "target/release/agentd", dest = "/usr/bin/agentd", mode = "0755" },
    { source = "packaging/systemd/agentd.service", dest = "/usr/lib/systemd/system/agentd.service", mode = "0644", config = false, doc = false },
    { source = "packaging/systemd/agentd.env", dest = "/etc/default/agentd", mode = "0644", config = true, doc = false },
    { source = "packaging/README.md", dest = "/usr/share/doc/agentd/README.md", mode = "0644", doc = true },
]
# /etc/agentd/ — operator drops workflow.toml here post-install. RPM
# scriptlet ensures the directory exists before file placement.
post_install_script = "install -d -m 0755 /etc/agentd"
