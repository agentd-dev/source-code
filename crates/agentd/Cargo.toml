[package]
name = "agentd"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Bounded workflow-driven agent runtime"
license = "MIT"
repository = "https://github.com/agentd-dev/source-code"
publish = false

[lib]
name = "agentd"
path = "src/lib.rs"

[[bin]]
name = "agentd"
path = "src/main.rs"

[features]
# Tool families (compile-time capability pruning, RFC §10.4).
# `trigger-http` is on by default so serve mode Just Works; the
# sealed-appliance build recipe turns it off so zero-egress
# deployments stay egress-free by construction.
default = ["tools-fs", "tools-env", "tools-data", "trigger-http", "auth"]
tools-fs = []
tools-env = []
tools-data = []
tools-http = []
tools-shell = []
tools-mcp = []

# Trigger adapters.
trigger-http = []
trigger-mcp = []

# Intelligence transports.
intel-unix = []
intel-http = []

# HTTP auth (bearer + HMAC webhook verification). `auth` ships in
# default builds — HMAC-SHA256 is a basic need for any production
# HTTP surface.
auth = ["dep:sha2", "dep:hmac"]

# In-process TLS termination + optional mTLS client-cert
# verification. Pulls rustls and rustls-pemfile; implies `auth` so
# the mTLS verifier is always reachable.
server-tls = ["auth", "dep:rustls", "dep:rustls-pemfile"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
toml = { version = "0.8", default-features = false, features = ["parse"] }
tracing = { version = "0.1", default-features = false, features = ["std", "attributes"] }
tracing-subscriber = { version = "0.3", default-features = false, features = ["std", "fmt", "env-filter", "ansi", "json"] }
# Atomic swap for hot-reload state (SIGHUP). Pure-Rust, no deps.
# Readers see a consistent snapshot with no mutex contention;
# writers replace the current value atomically.
arc-swap = "1"
sha2 = { version = "0.10", default-features = false, optional = true }
hmac = { version = "0.12", default-features = false, optional = true }
rustls = { version = "0.23", optional = true, default-features = false, features = ["std", "logging", "aws-lc-rs", "tls12"] }
rustls-pemfile = { version = "2", optional = true }

# libc — Unix-only. Used for sigaction (signals.rs). Every call
# site is `#[cfg(unix)]` gated, so scoping the dep to Unix targets
# lets the crate compile elsewhere without carrying the unused dep.
[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tempfile = "3"
# Generates self-signed server + client certs at test time so the
# TLS integration tests don't need fixture files to maintain.
rcgen = "0.13"
