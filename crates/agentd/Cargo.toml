[package]
name = "agentd"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Bounded workflow-driven agent runtime"
license = "MIT"
repository = "https://github.com/agentd-dev/source-code"
publish = false

[lib]
name = "agentd"
path = "src/lib.rs"

[[bin]]
name = "agentd"
path = "src/main.rs"

[features]
# Tool families (compile-time capability pruning, RFC §10.4).
default = ["tools-fs", "tools-env", "tools-data"]
tools-fs = []
tools-env = []
tools-data = []

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
toml = { version = "0.8", default-features = false, features = ["parse"] }

# libc — Unix-only. Used for sigaction (signals.rs). Every call
# site is `#[cfg(unix)]` gated, so scoping the dep to Unix targets
# lets the crate compile elsewhere without carrying the unused dep.
[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tempfile = "3"
