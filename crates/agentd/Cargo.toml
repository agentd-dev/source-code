[package]
name = "agentd"
version = "0.1.0"
edition = "2024"
rust-version = "1.88"
description = "Minimal, MCP-native, reactive agent runtime (rfcs/0001-mcp-native-agent-runtime.md)"
license = "MIT"
repository = "https://github.com/agentd-dev/source-code"
publish = false

[lib]
name = "agentd"
path = "src/lib.rs"

[[bin]]
name = "agentd"
path = "src/main.rs"

# Capability surface is compile-time. The default build is the minimalism
# target: no async runtime, no TLS, no C/C++ toolchain — single-digit
# first-party crates. Everything heavier is feature-gated and OFF by
# default. See rfcs/0002 §dependency-budget.
[features]
default = []
# Direct https:// intelligence/MCP when TLS is not sidecar-terminated.
# rustls with the `ring` provider (no cmake/C build dep) + bundled roots.
tls = ["dep:rustls", "dep:webpki-roots"]
# Enclave / microVM intelligence transport (AF_VSOCK).
vsock = ["dep:vsock"]
# poll/epoll listener for the high-fan-in served self-MCP only.
serve-mcp = ["dep:mio"]
# Optional cron-expression scheduling (internal time event source).
# Hand-rolled 5-field UTC parser — no dep (the minimalism moat, rfcs/0002).
cron = []
# Hand-written Prometheus text on the opt-in HTTP/socket surface (no dep).
metrics = []
# OTLP span export + GenAI semconv. The one feature allowed heavier deps;
# wired in M6 (deps intentionally not declared yet to keep the scaffold's
# dependency graph minimal and resolvable).
otel = []

[dependencies]
# The one non-negotiable dependency: JSON is the MCP + LLM wire format.
# Keep all wire types in one module (json/, wire/) so a swap to miniserde
# stays mechanical (rfcs/0002).
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# --- feature: tls ---
rustls = { version = "0.23", default-features = false, features = ["std", "ring", "tls12", "logging"], optional = true }
webpki-roots = { version = "0.26", optional = true }
# --- feature: vsock ---
vsock = { version = "0.5", optional = true }
# --- feature: serve-mcp ---
mio = { version = "1", features = ["os-poll", "net"], optional = true }
# --- feature: cron --- hand-rolled in triggers/timer.rs; no dependency.

# Unix-only: signals (sigaction), process control (setpgid/killpg/waitpid),
# prctl (PR_SET_CHILD_SUBREAPER / PR_SET_PDEATHSIG), setrlimit. Raw libc —
# no signal-hook, no nix in the default build (rfcs/0002, rfcs/0003).
[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tempfile = "3"

# Unix-only test helper: send SIGTERM to a spawned agentd to exercise the
# graceful-drain → exit-0 contract for the long-lived (loop/schedule/reactive)
# modes. `libc` is already a runtime dependency on Unix; this adds no new crate.
[target.'cfg(unix)'.dev-dependencies]
libc = "0.2"
