# A bounded agentic step inside a declared graph (RFC 0006 §2).
# The model investigates within max_steps, using ONLY the listed
# tools, every call policy-gated. The graph still owns routing.
#
#   ANTHROPIC_API_KEY=... agentd --config examples/agent-loop.toml \
#       --input '{"task":"summarise the newest file under /var/log/app"}'

name = "log_investigator"

[[intelligence.backends]]
name = "claude"
provider = "anthropic"
model = "claude-sonnet-4-6"
api_key_env = "ANTHROPIC_API_KEY"

[policy.fs]
read = ["/var/log/app/**"]
write = ["/tmp/agentd-reports/**"]

[[start_nodes]]
name = "main"
source = "manual"
entry_node = "investigate"

[[nodes]]
id = "investigate"
type = "agent_loop"
backend = "claude"
instructions_from = "trigger.task"
tools = ["read_file"]
max_steps = 8
max_tokens = 40000

[[nodes]]
id = "save"
type = "write_file"
path_from = "out.rendered"
content_from = "investigate.result"

[[nodes]]
id = "out"
type = "template_render"
template = "/tmp/agentd-reports/summary.txt"

[[nodes]]
id = "gave_up"
type = "fail"
reason = "investigation exhausted its step budget"

[[nodes]]
id = "done"
type = "terminate"

[[edges]]
from = "investigate"
to = "out"

# agent_loop takes the "exhausted" branch if it hits max_steps.
[[edges]]
from = "investigate"
when = "exhausted"
to = "gave_up"

[[edges]]
from = "out"
to = "save"

[[edges]]
from = "save"
to = "done"
