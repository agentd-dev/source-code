# Human-in-the-loop: prepare a change, pause for a person to review,
# then apply it on resume (RFC 0006 + the v0.9 durable-execution work).
#
# The run stops at `approve`, writes a checkpoint under --state-dir, and
# exits 7 (paused). A human reviews, then resumes by run id:
#
#   agentd --config examples/approval-gate.toml --state-dir /var/lib/agentd/state \
#          --input '{"service":"api","env":"prod"}'
#   # → status "paused", run_id "exec-…"; exit 7
#
#   agentd --config examples/approval-gate.toml --state-dir /var/lib/agentd/state \
#          --resume exec-…
#   # → status "completed"; the checkpoint is retired
#
# Inspect what happened either side of the pause with `--record run.json`
# then `agentd inspect run.json`.

name = "deploy_with_approval"

[[start_nodes]]
name = "main"
source = "manual"
entry_node = "prepare"

[[nodes]]
id = "prepare"
type = "template_render"
template = "Prepared: deploy {{service}} to {{env}}."
input_from = "trigger"

[[nodes]]
id = "approve"
type = "pause_for_approval"
reason = "Review the prepared change above, then resume to apply it."

[[nodes]]
id = "apply"
type = "terminate"

[[edges]]
from = "prepare"
to = "approve"

[[edges]]
from = "approve"
to = "apply"
