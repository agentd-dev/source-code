# Scheduled poller: every five minutes, fetch an endpoint and
# persist the latest snapshot. Serve mode is inferred from the
# interval trigger — no HTTP routes needed for a long-running
# process.
#
#   agentd --config examples/cron-poller.toml

name = "status_poller"

[policy.http]
urls = ["http://status.internal/*"]
methods = ["GET"]

[policy.fs]
write = ["/var/lib/agentd/status/**"]

[[start_nodes]]
name = "on_tick"
source = "event"
entry_node = "urls"

[[triggers]]
type = "interval"
every = "5m"
start_node = "on_tick"

[[nodes]]
id = "urls"
type = "template_render"
template = "http://status.internal/api/summary"

[[nodes]]
id = "fetch"
type = "http_request"
method = "GET"
url_from = "urls.rendered"
retry = { max_attempts = 3, backoff_ms = 250, on = "transient", jitter = 0.2 }

[[nodes]]
id = "paths"
type = "template_render"
template = "/var/lib/agentd/status/snapshot.json"

[[nodes]]
id = "save"
type = "write_file"
path_from = "paths.rendered"
content_from = "fetch.body"

[[nodes]]
id = "done"
type = "terminate"

[[nodes]]
id = "fetch_failed"
type = "fail"
reason = "status endpoint returned a non-2xx response"

[[edges]]
from = "urls"
to = "fetch"

[[edges]]
from = "fetch"
to = "paths"

# http_request emits an "error" branch on non-2xx — route it to a
# declared failure instead of writing a bad snapshot.
[[edges]]
from = "fetch"
when = "error"
to = "fetch_failed"

[[edges]]
from = "paths"
to = "save"

[[edges]]
from = "save"
to = "done"
