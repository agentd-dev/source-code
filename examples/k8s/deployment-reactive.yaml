# Long-lived reactive agentd as a Kubernetes Deployment (mode `reactive`).
#
# Same binary, same loop, same config as the one-shot Job — only the exit
# predicate differs (rfcs/0011 §7). A reactive daemon idles cheaply and wakes
# on MCP resource updates; it exits only 0 (clean SIGTERM drain), 143 (SIGTERM
# past the drain budget), or a fatal class (4 intelligence / 6 MCP / 137 OOM).
# A rolled pod should look like a clean 0, not a 143 failure (rfcs/0011 §5) —
# which is why the drain budget must fit inside the pod grace.
#
# SCOPE: reactivity rides the MCP servers' Streamable-HTTP subscriptions — agentd
# subscribes over HTTP/SSE and reacts to pushed notifications/resources/updated.
#
# NOTE: the operator that schedules/replicates/rolls this Deployment is
# EXTERNAL and not part of agentd (rfcs/0011 §1). agentd only honors the
# signal/drain/exit contract below.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentd-reactive
  labels:
    app.kubernetes.io/name: agentd
spec:
  # Reactive daemons are share-nothing and restart-safe (reconcile on start,
  # rfcs/0011 §7); replicas are independent. Keep at 1 unless your
  # subscriptions partition cleanly across instances.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agentd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentd
    spec:
      # MUST be > AGENT_DRAIN_TIMEOUT (default 25s) so agentd finishes its
      # bounded drain and exits 0 before the kubelet's own SIGKILL lands
      # (rfcs/0011 §3.3 / §4.2). 30s grace vs 25s drain leaves headroom for
      # the kill-ladder rungs + log flush. If you raise --drain-timeout, raise
      # this in lockstep — keep grace strictly larger.
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agentd
          # Multi-arch, cosign-signed, static-on-scratch; ships the dep-free
          # cloud-native features (the /healthz+/readyz surface the probes use).
          # Pin a version tag (or a digest) in production rather than :latest.
          image: ghcr.io/agentd-dev/agentd:latest
          args:
            - --mode
            - reactive
            # Reactive mode requires >= 1 subscription. These are MCP resource
            # URIs served by the remote MCP servers declared below.
            - --subscribe
            - file:///data/inbox
            # Serve /healthz + /readyz (+ /metrics) for the k8s probes below.
            # The scratch image has no shell, so HTTP probes — not exec — are
            # the way to health-check it (rfcs/0010 §3.7). The bare `:port` form
            # binds all IPv4 interfaces, so the kubelet reaches it at the pod IP.
            - --metrics-addr
            - :9090
            # Keep the drain budget < terminationGracePeriodSeconds above.
            - --drain-timeout
            - 25s
            # Tools come from remote MCP servers (Streamable HTTP endpoints).
            - --mcp
            - fs=https://mcp-fs.internal/mcp
          env:
            - name: INSTRUCTION
              value: >-
                For each new item under /data/inbox, classify it and route it
                via the fs MCP server. Reconcile to desired state on each wake;
                items already handled are a no-op.
            - name: AGENT_INTELLIGENCE
              value: https://gw.example/v1
            - name: AGENT_INTELLIGENCE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agentd-intelligence
                  key: token
            - name: AGENT_MODEL
              value: claude-sonnet-4-6
            - name: AGENT_LOG_LEVEL
              value: info
          ports:
            - name: probes
              containerPort: 9090
          # Liveness = the supervisor heartbeat is fresh. The scratch image has no
          # shell, so probes are HTTP against the --metrics-addr surface above —
          # /healthz returns 200 while the supervisor tick is fresh, 503 once it
          # goes stale (rfcs/0010 §3.7). An idle reactive agent is HEALTHY:
          # liveness checks the supervisor's freshness, not whether work is
          # flowing. A stuck subagent must NOT fail pod liveness — the supervisor
          # kills it.
          livenessProbe:
            httpGet:
              path: /healthz
              port: probes
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          # Readiness = the daemon is up and serving. /readyz returns 200 while
          # running; on drain agentd stops serving and the pod leaves rotation.
          readinessProbe:
            httpGet:
              path: /readyz
              port: probes
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              # OOM => 137 => raise this (rfcs/0011 §5).
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        # Intelligence is reached directly over HTTPS (AGENT_INTELLIGENCE above); a
        # same-pod TLS-terminating sidecar would instead be a loopback http:// URL —
        # either way no shared socket volume is needed.
        - name: data
          emptyDir: {}
