# Bounded fan-out over DATA: a `map` node runs one sub-workflow per
# element of an array from the context — "for each X, do the bounded
# thing". Where `parallel` fans out over declared branches, `map` fans
# out over whatever list the input carries, under a mandatory ceiling:
# more than max_items elements is a hard error, never a silent
# truncation.
#
#   agentd --config examples/map-fanout.toml \
#          --input '{"items":[{"kind":"invoice"},{"kind":"contract"},{"kind":"resume"}]}'
#
# Output: {results: [{result|error}, …], ok} in input order; any element
# failure routes `error`. Address results positionally with array-index
# paths (label_each.results.0.result).

name = "map_fanout"

[[start_nodes]]
name = "main"
source = "manual"
entry_node = "label_each"

[[nodes]]
id = "label_each"
type = "map"
items_from = "trigger.items"
workflow = "examples/subworkflow-child.toml"
max_items = 25
max_concurrent = 4

[[nodes]]
id = "first_label"
type = "json_select"
input_from = "label_each"
path = "results.0.result.rendered"

[[nodes]]
id = "done"
type = "terminate"

[[nodes]]
id = "element_failed"
type = "fail"
reason = "a map element failed — nothing downstream ran"

[[edges]]
from = "label_each"
to = "first_label"

[[edges]]
from = "label_each"
when = "error"
to = "element_failed"

[[edges]]
from = "first_label"
to = "done"
