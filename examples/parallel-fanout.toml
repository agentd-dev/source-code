# Parallel fan-out / fan-in: run several sub-workflows concurrently,
# then join their results. Each branch is a full sub-DAG on the same
# engine under the same policy/budget — only scheduling is parallel, the
# bounded substrate is unchanged. Output is
# {results: [{result|error}, …], ok}; any branch failure routes `error`.
#
#   agentd --config examples/parallel-fanout.toml --input '{"kind":"invoice"}'

name = "fan_out"

[[start_nodes]]
name = "main"
source = "manual"
entry_node = "split"

[[nodes]]
id = "split"
type = "parallel"
branches = [
    { workflow = "examples/subworkflow-child.toml", input_from = "trigger" },
    { workflow = "examples/subworkflow-child.toml", input_from = "trigger" },
]

[[nodes]]
id = "done"
type = "terminate"

[[nodes]]
id = "failed"
type = "fail"
reason = "a fan-out branch failed"

[[edges]]
from = "split"
to = "done"

# Any branch failing emits the `error` branch — route it to a declared
# failure instead of dead-ending.
[[edges]]
from = "split"
when = "error"
to = "failed"
