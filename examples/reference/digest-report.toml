# Reference deployment — scheduled digest report (cron-driven)
# ============================================================
# A production-shaped agent: every 24h, read the day's events from a
# local inbox, summarize them with one bounded llm_infer step, and write
# a markdown digest. No inbound network surface — a long-running process
# driven entirely by its interval trigger.
#
# Deploy notes: see examples/reference/README.md. Validate with:
#
#   agentd --config examples/reference/digest-report.toml --validate-only
#
# Run (serve mode is inferred from the interval trigger):
#
#   ANTHROPIC_API_KEY=… \
#     agentd --config examples/reference/digest-report.toml

name = "daily_digest"

# --- Model: a frontier model summarizes. Key from env, never here.
#     (The name `default` is reserved for the --intel-unix / --intel-http
#     CLI transports, so declared backends carry an explicit name.)
[[intelligence.backends]]
name = "summarizer"
provider = "anthropic"
model = "claude-opus-4-8"
api_key_env = "ANTHROPIC_API_KEY"

# --- Bounds: a digest run reads one file and writes one report.
[budget]
max_llm_tokens = 30000
max_memory_mb = 256
max_run_time_secs = 120
max_fs_write_mb = 8

# --- Policy: fail-closed. Read only the inbox, write only the reports
#     directory. No shell, no outbound HTTP.
[policy.fs]
read = ["/var/lib/agentd/digest/inbox/**"]
write = ["/var/lib/agentd/digest/reports/**"]

[logging.audit]
target = "file:/var/log/agentd/digest-audit.jsonl"

[[start_nodes]]
name = "on_tick"
source = "event"
entry_node = "inbox_path"

[[triggers]]
type = "interval"
every = "24h"
start_node = "on_tick"

# 1. Render the input path, then read it. read_file takes its path from
#    context (path_from), so a template_render node supplies it.
[[nodes]]
id = "inbox_path"
type = "template_render"
template = "/var/lib/agentd/digest/inbox/events.json"

[[nodes]]
id = "load"
type = "read_file"
path_from = "inbox_path.rendered"

# 2. Parse the events into structured JSON.
[[nodes]]
id = "parse"
type = "parse_json"
input_from = "load.content"

# 3. Summarize — one bounded reasoning step. The model sees the events
#    as data; it cannot reach a tool or alter the graph.
[[nodes]]
id = "summarize"
type = "llm_infer"
backend = "summarizer"
prompt = """
Summarize the day's events into a concise markdown digest with three
sections: ## Highlights, ## Incidents, ## Follow-ups. Be specific; cite
counts where the data supports them.

Events:
{{parsed}}
"""
input_from = "parse"

# 4. Write the report.
[[nodes]]
id = "report_path"
type = "template_render"
template = "/var/lib/agentd/digest/reports/digest.md"

[[nodes]]
id = "write"
type = "write_file"
path_from = "report_path.rendered"
content_from = "summarize.content"

[[nodes]]
id = "done"
type = "terminate"

# read_file emits an "error" branch when the inbox is missing — record a
# declared failure instead of summarizing an empty file.
[[nodes]]
id = "no_inbox"
type = "fail"
reason = "digest inbox /var/lib/agentd/digest/inbox/events.json not found"

[[edges]]
from = "inbox_path"
to = "load"

[[edges]]
from = "load"
to = "parse"

[[edges]]
from = "load"
when = "error"
to = "no_inbox"

[[edges]]
from = "parse"
to = "summarize"

[[edges]]
from = "summarize"
to = "report_path"

[[edges]]
from = "report_path"
to = "write"

[[edges]]
from = "write"
to = "done"
