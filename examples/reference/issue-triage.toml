# Reference deployment — GitHub issue triage (webhook-driven)
# =============================================================
# A production-shaped agent: an HMAC-verified GitHub webhook fires an
# llm_infer classification; high-severity issues pause for a human
# (durable HITL) before being recorded as urgent, everything else is
# filed automatically. Every side effect is policy-gated and budgeted.
#
# Deploy notes: see examples/reference/README.md. Validate with:
#
#   agentd --config examples/reference/issue-triage.toml --validate-only
#
# Run (serve mode is inferred from [[http_routes]]; --state-dir is
# required so the high-severity pause can checkpoint):
#
#   ANTHROPIC_API_KEY=… GITHUB_WEBHOOK_SECRET=… \
#     agentd --config examples/reference/issue-triage.toml \
#            --bind 0.0.0.0:8080 --state-dir /var/lib/agentd/state

name = "issue_triage"

# --- Model: a frontier model classifies. Key from env, never here.
#     (The name `default` is reserved for the --intel-unix / --intel-http
#     CLI transports, so declared backends carry an explicit name.)
[[intelligence.backends]]
name = "classifier"
provider = "anthropic"
model = "claude-opus-4-8"
api_key_env = "ANTHROPIC_API_KEY"

# --- Bounds: a triage run is small and bounded on every axis.
[budget]
max_llm_tokens = 20000
max_memory_mb = 256
max_run_time_secs = 60
max_fs_write_mb = 4

# --- Auth: GitHub HMAC-SHA256 over the raw body.
[auth.hmac.github]
secret_env = "GITHUB_WEBHOOK_SECRET"
header = "X-Hub-Signature-256"
prefix = "sha256="

# --- Policy: fail-closed. The run may write triage records under one
#     directory and nothing else; it has no shell, no outbound HTTP.
[policy.fs]
write = ["/var/lib/agentd/triage/**"]

# --- Audit: a dedicated, redacted JSONL sink for compliance retention.
[logging.audit]
target = "file:/var/log/agentd/triage-audit.jsonl"

[[start_nodes]]
name = "on_issue"
source = "http"
entry_node = "classify"

[[http_routes]]
method = "POST"
path = "/webhook/github"
start_node = "on_issue"
auth = "hmac:github"
rate_limit = { capacity = 60, per_second = 10.0 }

# 1. Classify the issue. The model fills exactly one node; it cannot
#    pick tools or edges. Output is schema-enforced (with `schema`).
[[nodes]]
id = "classify"
type = "llm_infer"
backend = "classifier"
prompt = """
You are triaging a GitHub issue. Classify it.

Title: {{issue.title}}
Body:  {{issue.body}}

Respond as JSON only:
{"area": "bug|feature|docs|question", "severity": "low|medium|high", "summary": "one sentence"}
"""
input_from = "trigger"
output_schema = "examples/reference/schemas/triage.json"
output_repairs = 2

# 2. Route on the model's severity — the switch reads the value, the
#    model never sees the graph.
[[nodes]]
id = "route"
type = "switch"
expr = "classify.parsed.severity"

# 3a. high → pause for a human (durable; resume by run id to proceed).
[[nodes]]
id = "review"
type = "pause_for_approval"
reason = "High-severity issue triaged by the model — confirm before recording as urgent."

[[nodes]]
id = "urgent_path"
type = "template_render"
template = "/var/lib/agentd/triage/urgent-{{issue.number}}.json"
input_from = "trigger"

[[nodes]]
id = "file_urgent"
type = "write_file"
path_from = "urgent_path.rendered"
content_from = "classify.content"

# 3b. medium / low → file automatically.
[[nodes]]
id = "triage_path"
type = "template_render"
template = "/var/lib/agentd/triage/issue-{{issue.number}}.json"
input_from = "trigger"

[[nodes]]
id = "file_triage"
type = "write_file"
path_from = "triage_path.rendered"
content_from = "classify.content"

[[nodes]]
id = "done"
type = "terminate"

[[edges]]
from = "classify"
to = "route"

[[edges]]
from = "route"
when = "high"
to = "review"

[[edges]]
from = "review"
to = "urgent_path"

[[edges]]
from = "urgent_path"
to = "file_urgent"

[[edges]]
from = "file_urgent"
to = "done"

[[edges]]
from = "route"
when = "medium"
to = "triage_path"

[[edges]]
from = "route"
when = "low"
to = "triage_path"

[[edges]]
from = "triage_path"
to = "file_triage"

[[edges]]
from = "file_triage"
to = "done"
