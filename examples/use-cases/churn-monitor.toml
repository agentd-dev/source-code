# Use case — churn-risk early warning
# ====================================
# Article: docs/use-cases/churn-monitor.md
#
# Monday mornings: pull the weekly usage export, score it with one
# schema-enforced LLM step, then DIFF the structured result against last
# week's snapshot (diff_compute — structural, not vibes). Nothing
# changed → terminate silently. Risk band moved → the customer-success
# channel gets a specific alert with what changed. The agent's memory is
# a file on disk you can read.
#
#   ANTHROPIC_API_KEY=… SLACK_WEBHOOK_URL=… \
#     agentd --config examples/use-cases/churn-monitor.toml
#
# Build: --features intel-remote,schema,tools-http-tls,trigger-cron

name = "churn_monitor"

[[intelligence.backends]]
name = "scorer"
provider = "anthropic"
model = "claude-opus-4-8"
api_key_env = "ANTHROPIC_API_KEY"

[budget]
max_llm_tokens = 30000
max_run_time_secs = 180
max_fs_write_mb = 4

[policy.http]
urls = [
  "https://usage.example.com/api/**",
  "https://hooks.slack.com/services/**",
]
methods = ["GET", "POST"]

[policy.env]
read_keys = ["SLACK_WEBHOOK_URL"]

[policy.fs]
read = ["/var/lib/agentd/churn/**"]
write = ["/var/lib/agentd/churn/**"]

[[start_nodes]]
name = "weekly"
source = "event"
entry_node = "usage_url"

[[triggers]]
type = "cron"
schedule = "0 8 * * 1"
start_node = "weekly"

# 1. Pull the weekly usage export.
[[nodes]]
id = "usage_url"
type = "template_render"
template = "https://usage.example.com/api/accounts/weekly"

[[nodes]]
id = "fetch"
type = "http_request"
method = "GET"
url_from = "usage_url.rendered"

# 2. Score it — structured, schema-enforced.
[[nodes]]
id = "score"
type = "llm_infer"
backend = "scorer"
prompt = """
Score churn risk from this weekly usage export. Consider login decay,
seat shrinkage, support friction, and failed payments.

Export:
{{body}}

JSON only:
{"risk_band": "calm|elevated|urgent",
 "top_accounts": "Acme, Globex, ...",
 "summary": "two sentences on what is driving the risk"}
"""
input_from = "fetch"
output_schema = "examples/use-cases/schemas/churn.json"
output_repairs = 2

# 3. Load last week's snapshot. Missing file = first run → just save.
[[nodes]]
id = "prev_path"
type = "template_render"
template = "/var/lib/agentd/churn/latest.json"

[[nodes]]
id = "prev"
type = "read_file"
path_from = "prev_path.rendered"

[[nodes]]
id = "prev_parsed"
type = "parse_json"
input_from = "prev.content"

# 4. Structural diff: which fields changed, from what, to what.
[[nodes]]
id = "delta"
type = "diff_compute"
left_from = "prev_parsed.parsed"
right_from = "score.parsed"

[[nodes]]
id = "changed"
type = "condition"
expr = "delta.unchanged"

# 5a. Risk picture moved → alert with the diff attached.
[[nodes]]
id = "slack_url"
type = "read_env"
key = "SLACK_WEBHOOK_URL"

[[nodes]]
id = "alert"
type = "http_request"
method = "POST"
url_from = "slack_url.value"
body_from = "delta"

# 6. Persist this week's snapshot (both paths).
[[nodes]]
id = "save"
type = "write_file"
path_from = "prev_path.rendered"
content_from = "score.parsed"

[[nodes]]
id = "save_first_run"
type = "write_file"
path_from = "prev_path.rendered"
content_from = "score.parsed"

[[nodes]]
id = "done"
type = "terminate"

[[nodes]]
id = "quiet"
type = "terminate"

[[nodes]]
id = "first_run_done"
type = "terminate"

[[nodes]]
id = "usage_down"
type = "fail"
reason = "usage API unreachable"

[[edges]]
from = "usage_url"
to = "fetch"

[[edges]]
from = "fetch"
to = "score"

[[edges]]
from = "fetch"
when = "error"
to = "usage_down"

[[edges]]
from = "score"
to = "prev_path"

[[edges]]
from = "prev_path"
to = "prev"

[[edges]]
from = "prev"
to = "prev_parsed"

# First run: no snapshot yet — save and exit quietly.
[[edges]]
from = "prev"
when = "error"
to = "save_first_run"

[[edges]]
from = "save_first_run"
to = "first_run_done"

[[edges]]
from = "prev_parsed"
to = "delta"

[[edges]]
from = "delta"
to = "changed"

[[edges]]
from = "changed"
when = "false"
to = "slack_url"

[[edges]]
from = "changed"
when = "true"
to = "quiet"

[[edges]]
from = "slack_url"
to = "alert"

[[edges]]
from = "alert"
to = "save"

[[edges]]
from = "save"
to = "done"
