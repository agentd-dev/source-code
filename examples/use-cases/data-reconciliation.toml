# Use case — nightly data reconciliation sentinel
# ================================================
# Article: docs/use-cases/data-reconciliation.md
#
# Every night: run the reconciliation query through an MCP database
# server (the agent never holds raw DB credentials — the MCP server
# does), structurally diff the result against the committed expectation,
# and if anything drifted, have one bounded LLM step explain WHAT in
# operator language before alerting. Quiet nights terminate silently.
#
#   ANTHROPIC_API_KEY=… DATABASE_URL=… SLACK_WEBHOOK_URL=… \
#     agentd --config examples/use-cases/data-reconciliation.toml
#
# Build: --features intel-remote,tools-http-tls,trigger-cron (MCP is
# always compiled). The MCP server is spawned per the block below; only
# the `query` tool is allowlisted.

name = "data_reconciliation"

[[intelligence.backends]]
name = "explainer"
provider = "anthropic"
model = "claude-opus-4-8"
api_key_env = "ANTHROPIC_API_KEY"

[[mcp_servers]]
name = "warehouse"
command = ["npx", "-y", "@modelcontextprotocol/server-postgres"]
allow_tools = ["query"]

[budget]
max_llm_tokens = 15000
max_run_time_secs = 240

[policy.mcp]
servers = ["warehouse"]
tools = ["query"]

[policy.http]
urls = ["https://hooks.slack.com/services/**"]
methods = ["POST"]

[policy.env]
read_keys = ["SLACK_WEBHOOK_URL"]

[policy.fs]
read = ["/etc/agentd/reconciliation/**"]
write = ["/var/lib/agentd/reconciliation/**"]

[[start_nodes]]
name = "nightly"
source = "event"
entry_node = "sql"

[[triggers]]
type = "cron"
schedule = "30 2 * * *"
start_node = "nightly"

# 1. The reconciliation query is DECLARED — the model never writes SQL.
[[nodes]]
id = "sql"
type = "template_render"
template = """
{"sql": "select source, count(*) as rows, sum(amount_cents) as cents from ledger group by source order by source"}
"""

[[nodes]]
id = "sql_args"
type = "parse_json"
input_from = "sql.rendered"

[[nodes]]
id = "run_query"
type = "call_mcp_tool"
server = "warehouse"
tool = "query"
args_from = "sql_args.parsed"

# 2. Load the committed expectation and diff structurally.
[[nodes]]
id = "expected_path"
type = "template_render"
template = "/etc/agentd/reconciliation/expected.json"

[[nodes]]
id = "expected_raw"
type = "read_file"
path_from = "expected_path.rendered"

[[nodes]]
id = "expected"
type = "parse_json"
input_from = "expected_raw.content"

[[nodes]]
id = "delta"
type = "diff_compute"
left_from = "expected.parsed"
right_from = "run_query"

[[nodes]]
id = "drifted"
type = "condition"
expr = "delta.unchanged"

# 3. Drift → explain it for the on-call, then alert with both.
[[nodes]]
id = "explain"
type = "llm_infer"
backend = "explainer"
prompt = """
The nightly ledger reconciliation drifted from the expectation. Explain
what changed in two sentences an on-call data engineer acts on —
which sources, which direction, how large.

Structural diff:
{{added}} {{removed}} {{changed}}
"""
input_from = "delta"

[[nodes]]
id = "slack_url"
type = "read_env"
key = "SLACK_WEBHOOK_URL"

[[nodes]]
id = "alert"
type = "http_request"
method = "POST"
url_from = "slack_url.value"
body_from = "explain.content"

[[nodes]]
id = "alerted"
type = "terminate"

[[nodes]]
id = "quiet_night"
type = "terminate"

[[nodes]]
id = "no_expectation"
type = "fail"
reason = "expected.json missing — commit an expectation before enabling the sentinel"

[[edges]]
from = "sql"
to = "sql_args"

[[edges]]
from = "sql_args"
to = "run_query"

[[edges]]
from = "run_query"
to = "expected_path"

[[edges]]
from = "expected_path"
to = "expected_raw"

[[edges]]
from = "expected_raw"
to = "expected"

[[edges]]
from = "expected_raw"
when = "error"
to = "no_expectation"

[[edges]]
from = "expected"
to = "delta"

[[edges]]
from = "delta"
to = "drifted"

[[edges]]
from = "drifted"
when = "true"
to = "quiet_night"

[[edges]]
from = "drifted"
when = "false"
to = "explain"

[[edges]]
from = "explain"
to = "slack_url"

[[edges]]
from = "slack_url"
to = "alert"

[[edges]]
from = "alert"
to = "alerted"
