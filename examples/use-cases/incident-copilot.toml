# Use case — incident-response copilot
# =====================================
# Article: docs/use-cases/incident-copilot.md
#
# An alert fires. Before a human has even opened the laptop, the agent
# has read the runbook and recent log tail, formed a hypothesis with
# blast-radius, and posted it to the incident channel. If a mitigation is
# warranted, the run CHECKPOINTS — a human resumes it, and only then does
# the one pre-approved, argv-pinned script run. The model never chooses
# the command; the workflow declares it, the policy allowlists it, the
# human authorizes it. Three locks, independently auditable.
#
#   ANTHROPIC_API_KEY=… ALERT_HMAC_SECRET=… SLACK_WEBHOOK_URL=… \
#     agentd --config examples/use-cases/incident-copilot.toml \
#            --bind 0.0.0.0:8080 --state-dir /var/lib/agentd/state
#
# Build: --features intel-remote,schema,tools-http-tls,tools-shell

name = "incident_copilot"

[[intelligence.backends]]
name = "responder"
provider = "anthropic"
model = "claude-opus-4-8"
api_key_env = "ANTHROPIC_API_KEY"

[budget]
max_llm_tokens = 30000
max_run_time_secs = 120
max_memory_mb = 512

[auth.hmac.alerts]
secret_env = "ALERT_HMAC_SECRET"
header = "X-Alert-Signature"
prefix = "sha256="

[policy.fs]
read = [
  "/etc/runbooks/**",
  "/var/log/app/**",
]

[policy.http]
urls = ["https://hooks.slack.com/services/**"]
methods = ["POST"]

[policy.env]
read_keys = ["SLACK_WEBHOOK_URL"]

# Exactly ONE executable may ever run, by canonical path. The model
# cannot name a command; this list is the universe.
[policy.shell]
commands = ["/usr/local/bin/restart-app"]

[logging.audit]
target = "file:/var/log/agentd/incidents-audit.jsonl"

[[start_nodes]]
name = "on_alert"
source = "http"
entry_node = "runbook_path"

[[http_routes]]
method = "POST"
path = "/alerts/fire"
start_node = "on_alert"
auth = "hmac:alerts"
rate_limit = { capacity = 20, per_second = 5.0 }

# 1. Gather: the service's runbook + the recent log tail.
[[nodes]]
id = "runbook_path"
type = "template_render"
template = "/etc/runbooks/{{service}}.md"
input_from = "trigger"

[[nodes]]
id = "runbook"
type = "read_file"
path_from = "runbook_path.rendered"

[[nodes]]
id = "log_path"
type = "template_render"
template = "/var/log/app/{{service}}.log"
input_from = "trigger"

[[nodes]]
id = "logs"
type = "read_file"
path_from = "log_path.rendered"

# 2. Hypothesis + blast radius + whether the ONE pre-approved mitigation
#    applies — schema-enforced so the answer is structured, not vibes.
[[nodes]]
id = "assess"
type = "llm_infer"
backend = "responder"
prompt = """
An alert fired: {{alert_name}} on service {{service}}, severity
{{severity}}. Using the runbook and the log tail below, give your
hypothesis, the blast radius, and whether restarting the app (our one
pre-approved mitigation) is warranted — say 'restart-app' or 'none'.

Runbook:
{{runbook}}

Recent logs:
{{logs}}

JSON only:
{"hypothesis": "...", "blast_radius": "single-host|service|customer-facing",
 "proposed_mitigation": "restart-app or none"}
"""
input_from = "trigger"
output_schema = "examples/use-cases/schemas/incident.json"
output_repairs = 2

# 3. The channel gets the assessment immediately, before any action.
[[nodes]]
id = "slack_url"
type = "read_env"
key = "SLACK_WEBHOOK_URL"

[[nodes]]
id = "post_assessment"
type = "http_request"
method = "POST"
url_from = "slack_url.value"
body_from = "assess.parsed"

# 4. A human authorizes the mitigation by resuming the run.
[[nodes]]
id = "authorize"
type = "pause_for_approval"
reason = "Assessment posted — resume to run the pre-approved mitigation (restart-app)."

# 5. The argv is DECLARED. Not model-derived, not interpolated.
[[nodes]]
id = "mitigate"
type = "shell_run"
command = "/usr/local/bin/restart-app"
timeout_secs = 60

[[nodes]]
id = "resolved"
type = "terminate"

[[nodes]]
id = "no_runbook"
type = "fail"
reason = "no runbook for this service — page the on-call"

[[nodes]]
id = "mitigation_failed"
type = "fail"
reason = "mitigation script exited non-zero — page the on-call"

[[edges]]
from = "runbook_path"
to = "runbook"

[[edges]]
from = "runbook"
to = "log_path"

[[edges]]
from = "runbook"
when = "error"
to = "no_runbook"

[[edges]]
from = "log_path"
to = "logs"

[[edges]]
from = "logs"
to = "assess"

# Logs missing is survivable — assess on the runbook alone.
[[edges]]
from = "logs"
when = "error"
to = "assess"

[[edges]]
from = "assess"
to = "slack_url"

[[edges]]
from = "slack_url"
to = "post_assessment"

[[edges]]
from = "post_assessment"
to = "authorize"

[[edges]]
from = "authorize"
to = "mitigate"

[[edges]]
from = "mitigate"
to = "resolved"

[[edges]]
from = "mitigate"
when = "error"
to = "mitigation_failed"
