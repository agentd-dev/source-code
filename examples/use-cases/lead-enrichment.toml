# Use case — deep research on every new CRM lead
# ===============================================
# Article: docs/use-cases/lead-enrichment.md
#
# A CRM webhook fires when a lead is created. A bounded agent_loop then
# RESEARCHES the lead — company site, news, data APIs — using exactly one
# tool (http_request), under an explicit step cap, token budget, and a
# URL allowlist that enumerates which sources it may read. The result is
# a sales brief written back to the CRM and announced in Slack.
#
# This is the autonomy dial in one file: open-ended investigation where
# it earns its keep, inside bounds you can read before anything runs.
#
#   ANTHROPIC_API_KEY=… CRM_WEBHOOK_SECRET=… \
#     agentd --config examples/use-cases/lead-enrichment.toml \
#            --bind 0.0.0.0:8080
#
# Build: --features intel-remote,schema,tools-http-tls

name = "lead_enrichment"

[[intelligence.backends]]
name = "researcher"
provider = "anthropic"
model = "claude-opus-4-8"
api_key_env = "ANTHROPIC_API_KEY"

[budget]
max_llm_tokens = 80000        # research is the expensive step — cap it
max_run_time_secs = 180
max_memory_mb = 512

[auth.hmac.crm]
secret_env = "CRM_WEBHOOK_SECRET"
header = "X-Crm-Signature"
prefix = "sha256="

# The research loop may READ public sources and the enrichment API, and
# WRITE only to the CRM and Slack. Every URL the agent can ever touch is
# on this list — that is the whole point.
[policy.http]
urls = [
  "https://api.companydata.example.com/**",
  "https://news.example.com/api/**",
  "https://*.exa.ai/**",
  "https://crm.example.com/api/**",
  "https://hooks.slack.com/services/**",
]
methods = ["GET", "POST"]

[policy.env]
read_keys = ["SLACK_WEBHOOK_URL"]

[logging.audit]
target = "file:/var/log/agentd/leads-audit.jsonl"

[[start_nodes]]
name = "on_lead"
source = "http"
entry_node = "compose_task"

[[http_routes]]
method = "POST"
path = "/crm/lead-created"
start_node = "on_lead"
auth = "hmac:crm"
rate_limit = { capacity = 30, per_second = 2.0 }

# 1. Turn the webhook payload into a research instruction.
[[nodes]]
id = "compose_task"
type = "template_render"
template = """
Research the company "{{company}}" ({{website}}) for a sales brief.
Contact: {{contact_name}}, {{contact_role}}.
Find: what they build, size signals, recent news or funding, their
likely pain that our product addresses, and two personalized opening
lines. Use the enrichment and news APIs available to you. Finish with
the brief as plain markdown.
"""
input_from = "trigger"

# 2. Bounded investigation: ONLY http_request, ONLY allowlisted hosts,
#    at most 12 steps, inside the token budget. The loop's "exhausted"
#    branch is declared up front — running out of budget is an outcome,
#    not an incident.
[[nodes]]
id = "research"
type = "agent_loop"
backend = "researcher"
instructions_from = "compose_task.rendered"
tools = ["http_request"]
max_steps = 12
max_tokens = 60000

# 3. Write the brief back to the CRM record…
[[nodes]]
id = "crm_url"
type = "template_render"
template = "https://crm.example.com/api/leads/{{lead_id}}/notes"
input_from = "trigger"

[[nodes]]
id = "post_brief"
type = "http_request"
method = "POST"
url_from = "crm_url.rendered"
body_from = "research.result"

# 4. …and tell the owning rep in Slack.
[[nodes]]
id = "slack_url"
type = "read_env"
key = "SLACK_WEBHOOK_URL"

[[nodes]]
id = "notify"
type = "http_request"
method = "POST"
url_from = "slack_url.value"
body_from = "research.result"

[[nodes]]
id = "done"
type = "terminate"

[[nodes]]
id = "budget_spent"
type = "fail"
reason = "research loop exhausted its step budget before producing a brief"

[[edges]]
from = "compose_task"
to = "research"

[[edges]]
from = "research"
to = "crm_url"

[[edges]]
from = "research"
when = "exhausted"
to = "budget_spent"

[[edges]]
from = "crm_url"
to = "post_brief"

[[edges]]
from = "post_brief"
to = "slack_url"

[[edges]]
from = "slack_url"
to = "notify"

[[edges]]
from = "notify"
to = "done"
