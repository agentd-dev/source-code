# Use case — resume screening with a real audit trail
# ====================================================
# Article: docs/use-cases/resume-screening.md
#
# The ATS webhooks every new application. One schema-enforced LLM step
# scores it against the published rubric — and then the asymmetry that
# makes this defensible: "advance" can flow automatically, but EVERY
# "decline" checkpoints for a human. No candidate is rejected by a
# machine. The signed workflow is the documented process; the run record
# is the per-candidate evidence (what was read, what was scored, who
# resumed the decline).
#
#   ANTHROPIC_API_KEY=… ATS_TOKENS=… \
#     agentd --config examples/use-cases/resume-screening.toml \
#            --bind 0.0.0.0:8080 --state-dir /var/lib/agentd/state \
#            --record /var/lib/agentd/screening/last-run.json

name = "resume_screening"

[[intelligence.backends]]
name = "screener"
provider = "anthropic"
model = "claude-opus-4-8"
api_key_env = "ANTHROPIC_API_KEY"

[budget]
max_llm_tokens = 20000
max_run_time_secs = 60

[auth.bearer.ats]
tokens_env = "ATS_TOKENS"

[policy.http]
urls = ["https://ats.example.com/api/**"]
methods = ["POST"]

[logging.audit]
target = "file:/var/log/agentd/screening-audit.jsonl"

[[start_nodes]]
name = "on_application"
source = "http"
entry_node = "screen"

[[http_routes]]
method = "POST"
path = "/ats/application-created"
start_node = "on_application"
auth = "bearer:ats"
rate_limit = { capacity = 60, per_second = 10.0 }

# 1. Score against the rubric — the SAME rubric for every candidate,
#    verbatim in the workflow, version-controlled and signable.
[[nodes]]
id = "screen"
type = "llm_infer"
backend = "screener"
prompt = """
Score this application against the rubric. Judge only job-relevant
evidence; ignore name, school prestige, employment gaps, and any
demographic signal.

Rubric (1-5): relevant shipped work (x2), depth in our stack,
communication clarity in the application itself.

Role: {{role}}
Application:
{{application_text}}

JSON only:
{"score": 3, "strengths": "...", "gaps": "...",
 "recommendation": "advance|decline"}
"""
input_from = "trigger"
output_schema = "examples/use-cases/schemas/screen.json"
output_repairs = 2

[[nodes]]
id = "gate"
type = "switch"
expr = "screen.parsed.recommendation"

# 2a. Advance: flows straight back to the ATS.
[[nodes]]
id = "ats_url"
type = "template_render"
template = "https://ats.example.com/api/applications/{{application_id}}/screen-result"
input_from = "trigger"

[[nodes]]
id = "post_result"
type = "http_request"
method = "POST"
url_from = "ats_url.rendered"
body_from = "screen.parsed"

# 2b. Decline: a human reads the scorecard and resumes — their resume
#     action IS the decision, and it lands in the audit log with the
#     run id.
[[nodes]]
id = "human_owns_declines"
type = "pause_for_approval"
reason = "Machine recommends decline — a recruiter must own this decision."

[[nodes]]
id = "done"
type = "terminate"

[[nodes]]
id = "ats_down"
type = "fail"
reason = "ATS API rejected the screen result"

[[edges]]
from = "screen"
to = "gate"

[[edges]]
from = "gate"
when = "advance"
to = "ats_url"

[[edges]]
from = "gate"
when = "decline"
to = "human_owns_declines"

[[edges]]
from = "human_owns_declines"
to = "ats_url"

[[edges]]
from = "ats_url"
to = "post_result"

[[edges]]
from = "post_result"
to = "done"

[[edges]]
from = "post_result"
when = "error"
to = "ats_down"
