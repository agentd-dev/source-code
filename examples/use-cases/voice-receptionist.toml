# Use case — AI receptionist on Twilio (fully native)
# ====================================================
# Article: docs/use-cases/voice-receptionist.md
#
# Twilio drives a phone call by POSTing call events (form-encoded) to a
# webhook and ACTING ON the TwiML XML it gets back. As of v1.2.0 the
# whole exchange is native — no bridge service:
#
#   - Twilio's application/x-www-form-urlencoded body parses straight
#     into the trigger payload ({{SpeechResult}}, {{CallSid}}, …).
#   - `auth = "basic:twilio"` verifies the credentials Twilio carries
#     in the webhook URL (https://user:pass@agent.example.com/…).
#   - A `respond` node renders the TwiML reply verbatim — status 200,
#     text/xml, templated body.
#
# The model classifies; the graph routes; the caller can change what
# the workflow KNOWS, never what it CAN DO.
#
#   OPENAI_API_KEY=… TWILIO_WEBHOOK_CREDS="acct:s3cret" \
#     agentd --config examples/use-cases/voice-receptionist.toml \
#            --bind 0.0.0.0:8080
#
# Build: --features intel-remote,schema (server-tls or a TLS gateway in
# front — Twilio requires HTTPS webhook URLs).

name = "voice_receptionist"

[[intelligence.backends]]
name = "frontdesk"
provider = "openai"
model = "gpt-4o-mini"
api_key_env = "OPENAI_API_KEY"

[budget]
max_llm_tokens = 8000
max_run_time_secs = 15        # a caller is waiting — fail fast
max_memory_mb = 256

# Twilio can't set custom headers; it carries basic-auth credentials in
# the webhook URL. Newline-separated user:pass entries — rotate by
# adding the new pair, switching Twilio, then removing the old.
[auth.basic.twilio]
credentials_env = "TWILIO_WEBHOOK_CREDS"

# Fail-closed: this run may write the call log and nothing else. No
# outbound HTTP at all — the reply IS the side effect.
[policy.fs]
write = ["/var/lib/agentd/calls/**"]

[logging.audit]
target = "file:/var/log/agentd/voice-audit.jsonl"

[[start_nodes]]
name = "on_speech"
source = "http"
entry_node = "classify"

[[http_routes]]
method = "POST"
path = "/voice/turn"
start_node = "on_speech"
auth = "basic:twilio"
rate_limit = { capacity = 30, per_second = 10.0 }

# 1. One bounded reasoning step: caller speech in, intent + scripted
#    reply out, schema-enforced. The model cannot transfer the call,
#    cannot end it, cannot reach anything — it fills this node.
[[nodes]]
id = "classify"
type = "llm_infer"
backend = "frontdesk"
prompt = """
You are the front-desk agent for Acme. A caller said:

"{{SpeechResult}}"

Decide where this call goes and what to say next, as JSON only:
{"intent": "sales|support|operator", "reply": "<one or two short sentences to speak back>"}
Keep the reply warm, concrete, and under 40 words.
"""
input_from = "trigger"
output_schema = "examples/use-cases/schemas/intent.json"
output_repairs = 1

# 2. The graph routes — declared edges, not model whim.
[[nodes]]
id = "route"
type = "switch"
expr = "classify.parsed.intent"

# 3. Each lane renders its TwiML natively. Sales and support speak the
#    model's (schema-bounded) reply and gather the next turn; operator
#    speaks, then transfers to a human — a number declared HERE, not
#    anywhere a caller can influence.
[[nodes]]
id = "say_and_gather_sales"
type = "respond"
content_type = "text/xml"
body_template = """
<Response><Say>{{reply}}</Say><Gather input="speech" action="/voice/turn" method="POST" speechTimeout="auto"/></Response>
"""
input_from = "classify.parsed"

[[nodes]]
id = "say_and_gather_support"
type = "respond"
content_type = "text/xml"
body_template = """
<Response><Say>{{reply}}</Say><Gather input="speech" action="/voice/turn" method="POST" speechTimeout="auto"/></Response>
"""
input_from = "classify.parsed"

[[nodes]]
id = "transfer_to_human"
type = "respond"
content_type = "text/xml"
body_template = """
<Response><Say>{{reply}}</Say><Dial>+15550100</Dial></Response>
"""
input_from = "classify.parsed"

# 4. Append the turn to the per-call audit log — what was heard, what
#    was decided — then terminate (the reply is written at completion).
[[nodes]]
id = "log_path"
type = "template_render"
template = "/var/lib/agentd/calls/{{CallSid}}.jsonl"
input_from = "trigger"

[[nodes]]
id = "log_turn"
type = "write_file"
path_from = "log_path.rendered"
content_from = "classify.parsed"

[[nodes]]
id = "done"
type = "terminate"

[[edges]]
from = "classify"
to = "route"

[[edges]]
from = "route"
when = "sales"
to = "say_and_gather_sales"

[[edges]]
from = "route"
when = "support"
to = "say_and_gather_support"

[[edges]]
from = "route"
when = "operator"
to = "transfer_to_human"

[[edges]]
from = "say_and_gather_sales"
to = "log_path"

[[edges]]
from = "say_and_gather_support"
to = "log_path"

[[edges]]
from = "transfer_to_human"
to = "log_path"

[[edges]]
from = "log_path"
to = "log_turn"

[[edges]]
from = "log_turn"
to = "done"
